<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay it Forward Jiu-Jitsu | お問い合わせ・無料体験</title>
  <link rel="stylesheet" href="common.css">
  <style>
    .contact-page {
      padding: 72px 40px;
      max-width: 680px;
      margin: 0 auto;
    }

    .contact-intro {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-top: -24px;
      margin-bottom: 48px;
      line-height: 2;
    }

    .form-group { margin-bottom: 22px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .required {
      color: #c0392b;
      font-size: 11px;
      font-weight: 400;
      margin-left: 4px;
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--gray-mid);
      background: var(--white);
      font-size: 14px;
      font-family: var(--font-sans);
      outline: none;
      border-radius: 0;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus { border-color: var(--black); }

    .form-textarea { height: 120px; resize: vertical; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-submit { margin-top: 36px; }

    .form-submit button {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 15px;
      font-size: 15px;
      font-weight: 500;
      font-family: var(--font-sans);
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .form-submit button:hover { opacity: 0.75; }

    .form-note {
      font-size: 12px;
      color: var(--gray-text);
      text-align: center;
      margin-top: 12px;
    }

    /* ===== TABLET ===== */
    @media (max-width: 1024px) {
      .contact-page { padding: 56px 24px; }
    }

    /* ===== SP ===== */
    @media (max-width: 768px) {
      .contact-page { padding: 40px 20px; }
      .contact-intro { font-size: 13px; margin-bottom: 32px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
      .form-row .form-group:first-child { margin-bottom: 22px; }
    }

    .contact-cards-section {
      padding: 56px 40px 0;
      max-width: 960px;
      margin: 0 auto;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 0;
    }

    .contact-card {
      border: 1px solid var(--gray-mid);
      padding: 32px 20px;
      text-align: center;
    }

    .contact-card.line-card {
      background: #06c755;
      border-color: #06c755;
      color: var(--white);
    }

    .contact-icon { display: flex; justify-content: center; margin-bottom: 14px; }
    .contact-type { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .contact-desc { font-size: 12px; color: var(--gray-text); margin-bottom: 18px; line-height: 1.7; }
    .contact-card.line-card .contact-desc { color: rgba(255,255,255,0.85); }

    .contact-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid var(--black);
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }

    .contact-link:hover { opacity: 0.6; }
    .contact-card.line-card .contact-link { color: var(--white); border-bottom-color: var(--white); }

    @media (max-width: 768px) {
      .contact-cards-section { padding: 40px 20px 0; }
      .contact-grid { grid-template-columns: 1fr; gap: 12px; }
      .contact-card { padding: 24px 20px; }
    }
  
    .privacy-box {
      margin-top: 28px;
      padding: 20px;
      background: var(--gray-light);
      font-size: 13px;
      line-height: 2;
      color: #555;
      text-align: center;
    }

    .privacy-box a {
      color: var(--black);
      border-bottom: 1px solid var(--black);
    }

    .privacy-agree {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 13px;
      cursor: pointer;
    }

    .privacy-agree input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--black);
    }
  </style>
</head>
